<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — Kenji Morishima Photography</title>
    <meta
      name="description"
      content="Kenji Morishima へのお問い合わせ。撮影依頼・コラボレーション・展示のご相談はこちらから。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="is-loading">
    <div id="page-overlay" class="active"></div>
    <div id="cursor"></div>

    <nav class="nav" aria-label="サイトナビゲーション">
      <a href="index.html" class="nav__logo">K.MORISHIMA</a>
      <div class="nav__links" role="list">
        <a href="index.html" class="nav__link" role="listitem">Home</a>
        <a href="about.html" class="nav__link" role="listitem">About</a>
        <a href="contact.html" class="nav__link" role="listitem">Contact</a>
      </div>
    </nav>

    <!-- ============ CONTACT PAGE ============ -->
    <main class="contact-page" aria-label="コンタクト">
      <span class="contact-eyebrow">Get in Touch</span>

      <h1 class="contact-title">Let's work<br />together.</h1>

      <p class="contact-lead">
        撮影依頼、展覧会やコラボレーションのご提案など、<br />
        お気軽にご連絡ください。通常2〜3営業日以内にご返信します。
      </p>

      <div class="contact-links" role="list">
        <a
          href="mailto:hello@kenjimori.photo"
          class="contact-link"
          role="listitem"
          aria-label="メールでお問い合わせ"
        >
          hello@kenjimori.photo
          <span class="contact-link__arrow">↗</span>
        </a>
      </div>

      <div class="contact-social" role="list" aria-label="SNSリンク">
        <a
          href="https://instagram.com/"
          class="contact-social__link"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Instagram（新しいタブで開く）"
          >Instagram</a
        >
        <a
          href="https://twitter.com/"
          class="contact-social__link"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Twitter/X（新しいタブで開く）"
          >Twitter / X</a
        >
        <a
          href="https://www.behance.net/"
          class="contact-social__link"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Behance（新しいタブで開く）"
          >Behance</a
        >
      </div>
    </main>

    <footer class="site-footer">
      <small class="site-footer__copy">© 2025 Kenji Morishima</small>
      <span
        class="site-footer__top"
        role="button"
        tabindex="0"
        aria-label="ページ上部に戻る"
        >Top ↑</span
      >
    </footer>

    <script src="js/main.js"></script>
  </body>
</html>
